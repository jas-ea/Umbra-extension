<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reading Spotlight</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <div class="title-row">
      <div>
        <h1>Reading Spotlight</h1>
        <p>Dim everything except the content block you appear to be reading.</p>
      </div>
      <label class="switch">
        <input type="checkbox" id="enabledToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="control">
      <label for="dwellMs">Dwell before focus</label>
      <div class="inline">
        <input id="dwellMs" type="range" min="800" max="8000" step="100">
        <span id="dwellMsValue"></span>
      </div>
    </div>

    <div class="control">
      <label for="overlayOpacity">Overlay strength</label>
      <div class="inline">
        <input id="overlayOpacity" type="range" min="0.2" max="0.9" step="0.01">
        <span id="overlayOpacityValue"></span>
      </div>
    </div>

    <div class="buttons">
      <button id="focusNow">Focus now</button>
      <button id="pauseTab">Pause on this tab</button>
      <button id="openOptions" class="secondary">More settings</button>
    </div>

    <div class="footnote">Hotkey: Alt+Shift+R</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
